baseURL = "https://blog.minifish.org/"
copyright = "© Mini Fish 2014-present. Licensed under CC-BY-NC"
languageCode = "en-US"
title = "Mini Fish"
theme = "PaperMod"
enableRobotsTXT = true
enableEmoji = true
#summaryLength = 0 # show summary by default length
#hasCJKLanguage = false

[menus]
  [[menus.main]]
    name = "Engineering"
    url = "/categories/engineering/"
    weight = 10
  [[menus.main]]
    name = "Databases"
    url = "/categories/databases/"
    weight = 20
  [[menus.main]]
    name = "AI Tools"
    url = "/categories/ai-tools/"
    weight = 30
  [[menus.main]]
    name = "Field Notes"
    url = "/categories/field-notes/"
    weight = 40
  [[menus.main]]
    name = "Reviews"
    url = "/categories/reviews/"
    weight = 50
  [[menus.main]]
    name = "Archive"
    url = "/archives/"
    weight = 60
  [[menus.main]]
    name = "Search"
    url = "/search/"
    weight = 70

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  defaultTheme = "auto"
  description = "Engineering notes, AI workflows, infrastructure lessons, and field reports from things I actually use."
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = true
  hidemeta = false
  hideSummary = false
  ShowPageNums = true
  showtoc = true
  tocopen = false
  ShowFullTextinRSS = true
  author = "Jack Yu"
  images = ["/android-chrome-512x512.png"]

  [params.homeInfoParams]
    Title = "Hi there 👋"
    Content = "I’m Jack. This is where I keep notes from software engineering, AI workflows, infrastructure work, and the everyday systems I actually use."

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/jackysp"
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/jackysp"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/shuaipeng-yu-81280434/"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:i@minifish.org"

  [params.editPost]
    URL = "https://github.com/jackysp/blog/tree/master/content"
    Text = "Suggest Changes" # edit text
    appendFilePath = true # to append file path to Edit link

[services]
  [services.disqus]
    shortname = "jackysp"
  [services.googleAnalytics]
    id = "G-G0H8JF722Y"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[assets]
  favicon = "/favicon.ico"
  favicon16x16 = "/favicon-16x16.png"
  favicon32x32 = "/favicon-32x32.png"
  apple_touch_icon = "/apple-touch-icon.png"
  safari_pinned_tab = "/favicon.svg"
