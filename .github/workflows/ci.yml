name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    # 09:15 Asia/Singapore. This lets Hugo publish posts whose future dates have arrived.
    - cron: '15 1 * * *'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

    - name: Check out code with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Get dependencies
      run: go mod download

    - name: Check content
      run: make check

    - name: Check out my other private repo
      uses: actions/checkout@v4
      with:
        repository: jackysp/jackysp.github.io
        token: ${{ secrets.UPDATE_BLOG }}
        path: public

    - name: Build
      run: make build
    
    - name: Pushes to another repository
      id: public
      uses: cpina/github-action-push-to-another-repository@v1.5.1
      env:
        API_TOKEN_GITHUB: ${{ secrets.UPDATE_BLOG }}
      with:
        source-directory: 'public'
        destination-github-username: 'jackysp'
        destination-repository-name: 'jackysp.github.io'
        user-email: i@minifish.org
        commit-message: See ORIGIN_COMMIT
